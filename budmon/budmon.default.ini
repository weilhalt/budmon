# ==========================================================================
# BudMon Configuration
# ==========================================================================
# Edit this file to customize BudMon. Restart to apply changes.
# Delete a line to reset it to the default value.

[general]
# Language: "auto" (detect from system), "de", "en"
language = auto

# Dashboard refresh interval in milliseconds
refresh_ms = 1000

[model]
# Model determines token prices: opus, sonnet, haiku, custom
# "custom" uses the values from [prices] below.
model = opus

[prices]
# Only used when model = custom (ignored for opus/sonnet/haiku).
# Set model = custom above, then uncomment and adjust the prices below.
# Prices per 1M tokens in USD.
#
# price_input = 15.0
# price_output = 75.0
# price_cache_read = 1.5
# price_cache_create = 18.75

[thresholds]
# Quota utilization — when to show warning/alarm colors (percent)
quota_warn_pct = 75.0
quota_alarm_pct = 90.0

# Cache ratio — when to show warning/alarm colors (0.0 - 1.0)
cache_warn_ratio = 0.50
cache_alarm_ratio = 0.20

# Burn rate — safe/warning zones (percent per hour)
burn_safe_pct_h = 15.0
burn_warn_pct_h = 25.0

[window]
# Window position (set automatically, format: +X+Y)
geometry =
