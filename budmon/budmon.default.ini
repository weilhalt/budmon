# ==========================================================================
# BudMon Configuration
# ==========================================================================
# Edit this file to customize BudMon. Restart to apply changes.
# Delete a line to reset it to the default value.

[general]
# Language: "auto" (detect from system), "de", "en"
language = auto

# Dashboard refresh interval in milliseconds
refresh_ms = 1000

[model]
# Model determines token prices: opus, sonnet, haiku, custom
# "custom" uses the values from [prices] below.
model = opus

[prices]
# Only used when model = custom (ignored for opus/sonnet/haiku).
# Set model = custom above, then uncomment and adjust the prices below.
# Prices per 1M tokens in USD.
#
# price_input = 15.0
# price_output = 75.0
# price_cache_read = 1.5
# price_cache_create = 18.75

[thresholds]
# Quota utilization — when to show warning/alarm colors (percent)
quota_warn_pct = 75.0
quota_alarm_pct = 90.0

# Cache ratio — when to show warning/alarm colors (0.0 - 1.0)
cache_warn_ratio = 0.50
cache_alarm_ratio = 0.20

# Burn rate — safe/warning zones (percent per hour)
burn_safe_pct_h = 15.0
burn_warn_pct_h = 25.0

[statusline]
# Elements shown in Claude Code status line (left to right).
# Available elements:
#   cwd          — Working directory               (~/.DEV/.BUDMON)
#   model_info   — Model from Claude Code          ([Opus 4.6 (1M context)])
#   5h_bar       — 5h quota bar with percentage    (5h ████░░░░ 47%)
#   7d_bar       — 7d quota bar with percentage    (7d ██░░░░░░ 23%)
#   countdown_5h — Time until 5h reset             (↓2h14m)
#   countdown_7d — Time until 7d reset             (↓3d12h)
#   cost         — Session cost in USD             ($1.42)
#   burn_5h      — 5h burn rate per hour           (⚡18%/h)
#   burn_7d      — 7d burn rate per day            (⚡42%/d)
#   reserve      — Time margin before quota reset  (+1h12m)
#   cache        — Average cache hit ratio         (⊞72%)
#   tokens_in    — Cumulative input tokens         (→125k)
#   tokens_out   — Cumulative output tokens        (←42k)
#   requests     — Total request count             (#28)
#   model        — Active model from config        (opus)
# Elements that don't fit within max_width are dropped silently.
elements = cwd, model_info, 5h_bar, 7d_bar, countdown_5h, reserve

# Maximum visible character width (ANSI escape codes excluded)
max_width = 80

[window]
# Window position (set automatically, format: +X+Y)
geometry =
